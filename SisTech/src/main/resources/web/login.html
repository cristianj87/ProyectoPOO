<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - SisTech</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; background-color: #e9ecef; 
        }
        .login-card {
            background: white; padding: 40px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px;
            text-align: center;
        }
        .login-card h2 { color: #2c3e50; margin-bottom: 30px; font-size: 24px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-weight: bold; color: #34495e; margin-bottom: 8px; }
        .input-group input {
            width: 100%; padding: 12px; border: 1px solid #ced4da;
            border-radius: 6px; font-size: 16px; outline: none; transition: border-color 0.3s;
        }
        .input-group input:focus { border-color: #3498db; }

        .btn-login {
            width: 100%; background-color: #3498db; color: white; border: none;
            padding: 14px; border-radius: 6px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: background 0.3s; margin-top: 10px;
        }
        .btn-login:hover { background-color: #2980b9; }

        .btn-outline {
            width: 100%; background-color: transparent; color: #3498db; 
            border: 1px solid #3498db; padding: 14px; border-radius: 6px; 
            font-size: 16px; font-weight: bold; cursor: pointer; 
            transition: all 0.3s; margin-top: 15px;
        }
        .btn-outline:hover { background-color: #f1f8ff; }

        .error-msg {
            color: #e74c3c; margin-top: 15px; font-size: 14px; display: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Acceso al Sistema</h2>
        
        <div class="input-group">
            <label for="txtUsuario">Usuario</label>
            <input type="text" id="txtUsuario" placeholder="Ej. jperez">
        </div>
        
        <div class="input-group">
            <label for="txtPassword">Contraseña</label>
            <input type="password" id="txtPassword" placeholder="Tu contraseña">
        </div>

        <button class="btn-login" onclick="intentarLogin()">Iniciar Sesión</button>
        <button class="btn-outline" onclick="irARegistro()">Crear cuenta nueva</button>
        
        <div class="error-msg" id="mensajeError">Usuario o contraseña incorrectos.</div>
    </div>

    <script>
        function intentarLogin() {
            let u = document.getElementById("txtUsuario").value;
            let p = document.getElementById("txtPassword").value;
            let divError = document.getElementById("mensajeError");

            if(u.trim() === "" || p.trim() === "") {
                divError.innerText = "Por favor, complete todos los campos.";
                divError.style.display = "block";
                return;
            }

            if (window.javaBackend) {
                // Enviamos usuario y contraseña plana. Java se encarga del MD5.
                let accesoPermitido = window.javaBackend.validarLogin(u, p);
                
                if (accesoPermitido) {
                    window.javaBackend.cargarDashboard();
                } else {
                    divError.innerText = "Usuario o contraseña incorrectos.";
                    divError.style.display = "block";
                }
            } else {
                console.error("No hay conexión con el servidor Java.");
            }
        }

        function irARegistro() {
            if (window.javaBackend) {
                window.javaBackend.cargarPantallaRegistro();
            }
        }
    </script>
</body>
</html>
